version: "3.9"

services:
  # ?? Redis ????????????????????????????????????????????????????????????????????
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ?? API FastAPI ???????????????????????????????????????????????????????????????
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - model_storage:/app/server/infrastructure/storage/models
    command: uvicorn server.interfaces.main:app --host 0.0.0.0 --port 8000 --reload

  # ?? Worker IA ????????????????????????????????????????????????????????????????
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - CUDA_VISIBLE_DEVICES=0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - model_storage:/app/server/infrastructure/storage/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: python -m server.infrastructure.worker.main

  # ?? Frontend Next.js ?????????????????????????????????????????????????????????
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - server

volumes:
  redis_data:
  model_storage:
